name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install StyLua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check lua/ tests/ plugin/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        nvim-version: ['stable', 'nightly']
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.nvim-version }}

      - name: Install mini.test
        run: |
          mkdir -p deps
          git clone --depth 1 https://github.com/echasnovski/mini.test deps/mini.test

      - name: Run tests
        run: |
          nvim --headless -u tests/minimal_init.lua \
            -c "lua require('mini.test').setup(); MiniTest.run()" +q
